name: Sikaflex Price Monitor

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  monitor:
    name: "Scraping & Alertas"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price monitor
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py --force-email

      - name: Buscar archivos generados
        run: find . -name "*.xlsx" -o -name "prices.csv" 2>/dev/null || true

      - name: Commit data and Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "📊 Precios actualizados $(date +'%Y-%m-%d')"
          git push
